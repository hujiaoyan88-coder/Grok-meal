<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍽️GROK CALORIE</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono&display=swap');
    
    body {
      font-family: 'Roboto Mono', sans-serif;
      background: #0a0a0f;
      color: #00ffcc;
      margin: 0;
      padding: 12px;
      min-height: 100vh;
      background-image: radial-gradient(circle at 50% 30%, rgba(0, 255, 204, 0.1) 0%, transparent 60%);
    }
    h1 {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.95em;
      background: linear-gradient(90deg, #00ffcc, #00bbff);
      -webkit-background-clip: text;
      color: transparent;
      margin: 10px 0 20px;
      text-shadow: 0 0 25px #00ffcc;
    }
    .container { max-width: 420px; margin: 0 auto; }
    
    .card {
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid #00ffcc;
      border-radius: 18px;
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.25);
    }
    input, select {
      background: #111827;
      border: 1px solid #334155;
      color: #e0f2fe;
      padding: 14px 16px;
      border-radius: 10px;
      width: 100%;
      font-size: 1.05em;
      margin: 8px 0;
    }
    button {
      background: linear-gradient(45deg, #00ffcc, #00bbff);
      color: #000;
      font-weight: bold;
      font-size: 1.1em;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
    }
    button:active {
      transform: scale(0.97);
    }
    .entry {
      background: #1e2937;
      padding: 13px 15px;
      margin: 8px 0;
      border-radius: 10px;
      border-left: 5px solid #00ffcc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05em;
    }
    .delete {
      color: #ff3366;
      font-size: 1.4em;
      font-weight: bold;
      padding: 0 8px;
    }
    .total {
      font-size: 1.85em;
      text-align: center;
      margin: 20px 0;
      color: #67f7cc;
      text-shadow: 0 0 20px #00ffcc;
    }
    canvas {
      border-radius: 12px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GROK CALORIE</h1>

    <div class="card">
      <input type="date" id="date">
      
      <select id="mealType">
        <option value="朝">朝</option>
        <option value="昼">昼</option>
        <option value="夕">夕</option>
        <option value="間食">間食</option>
      </select>
      
      <input type="number" id="calories" placeholder="カロリー入力" inputmode="numeric">
      <button onclick="addMeal()">＋ 記録する</button>
    </div>

    <div class="card">
      <div id="todayLog"></div>
      <div id="todayTotal" class="total"></div>
    </div>

    <button onclick="showGraph()">月間グラフを表示</button>
    <canvas id="myChart" height="220"></canvas>
  </div>

  <script>
    const dateInput = document.getElementById('date');
    dateInput.value = new Date().toISOString().split('T')[0];

    function getData() { return JSON.parse(localStorage.getItem('grokMealData') || '{}'); }
    function saveData(data) { localStorage.setItem('grokMealData', JSON.stringify(data)); }

    function addMeal() {
      const date = dateInput.value;
      const type = document.getElementById('mealType').value;
      const cal = parseInt(document.getElementById('calories').value);

      if (!cal || cal <= 0) return alert("カロリーを正しく入力しろ");

      let allData = getData();
      if (!allData[date]) allData[date] = [];
      allData[date].push({ type, cal });
      saveData(allData);

      renderToday();
      document.getElementById('calories').value = '';
    }

    function renderToday() {
      const date = dateInput.value;
      const allData = getData();
      const entries = allData[date] || [];
      
      let html = `<h3 style="margin:8px 0 12px;">${date}</h3>`;
      let total = 0;

      entries.forEach((entry, i) => {
        total += entry.cal;
        html += `
          <div class="entry">
            <span>${entry.type}　<b>${entry.cal}</b> kcal</span>
            <span class="delete" onclick="deleteEntry('${date}', ${i})">×</span>
          </div>`;
      });

      document.getElementById('todayLog').innerHTML = html || '<p style="color:#64748b; text-align:center;">まだ何も記録してないぞ</p>';
      document.getElementById('todayTotal').innerHTML = `合計 <b>${total}</b> kcal`;
    }

    function deleteEntry(date, index) {
      let allData = getData();
      if (allData[date]) {
        allData[date].splice(index, 1);
        if (allData[date].length === 0) delete allData[date];
        saveData(allData);
        renderToday();
      }
    }

    function showGraph() {
      const allData = getData();
      const dates = Object.keys(allData).sort();
      const totals = dates.map(d => allData[d].reduce((sum, e) => sum + e.cal, 0));

      if (dates.length === 0) return alert("まだデータがない");

      const ctx = document.getElementById('myChart');
      if (window.myChartInstance) window.myChartInstance.destroy();

      window.myChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: '1日の合計',
            data: totals,
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0, 255, 204, 0.2)',
            tension: 0.4,
            borderWidth: 3.5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#a5f3fc', font: {size: 14} } } },
          scales: {
            x: { ticks: { color: '#94a3b8', font: {size: 12} } },
            y: { ticks: { color: '#94a3b8', font: {size: 12} }, beginAtZero: true }
          }
        }
      });
    }

    dateInput.addEventListener('change', renderToday);
    window.onload = renderToday;
  </script>
</body>
</html>
