<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️GROK CALORIE TRACKER</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap');
    
    body {
      font-family: 'Roboto Mono', sans-serif;
      background: #0a0a0f;
      color: #00ffcc;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 50% 20%, rgba(0, 255, 204, 0.08) 0%, transparent 50%);
    }
    h1 {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4em;
      background: linear-gradient(90deg, #00ffcc, #00aaff);
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #00ffcc;
      letter-spacing: 4px;
    }
    .container { max-width: 820px; margin: 0 auto; }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #00ffcc;
      border-radius: 16px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.25);
    }
    input, select {
      background: #111827;
      border: 1px solid #334155;
      color: #e0f2fe;
      padding: 14px;
      border-radius: 8px;
      width: 100%;
      margin: 8px 0;
    }
    button {
      background: linear-gradient(45deg, #00ffcc, #00aaff);
      color: #000;
      font-weight: bold;
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px #00ffcc;
    }
    .entry {
      background: #1e2937;
      padding: 12px 15px;
      margin: 8px 0;
      border-radius: 8px;
      border-left: 5px solid #00ffcc;
      display: flex;
      justify-content: space-between;
    }
    .delete {
      color: #ff3366;
      font-weight: bold;
      cursor: pointer;
    }
    .total {
      font-size: 2em;
      text-align: center;
      margin: 20px 0;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GROK CALORIE</h1>

    <div class="card">
      <input type="date" id="date">
      
      <select id="mealType">
        <option value="朝">朝</option>
        <option value="昼">昼</option>
        <option value="夕">夕</option>
        <option value="間食">間食</option>
      </select>
      
      <input type="number" id="calories" placeholder="カロリーを入力">
      <button onclick="addMeal()">＋ 追加する</button>
    </div>

    <div class="card">
      <div id="todayLog"></div>
      <div id="todayTotal" class="total"></div>
    </div>

    <button onclick="showGraph()">月間グラフを表示</button>
    <canvas id="myChart" style="margin-top:25px; background:#0f172a; border-radius:12px; padding:10px;"></canvas>
  </div>

  <script>
    const dateInput = document.getElementById('date');
    dateInput.value = new Date().toISOString().split('T')[0];

    function getData() {
      return JSON.parse(localStorage.getItem('grokMealData') || '{}');
    }

    function saveData(data) {
      localStorage.setItem('grokMealData', JSON.stringify(data));
    }

    function addMeal() {
      const date = dateInput.value;
      const type = document.getElementById('mealType').value;
      const cal = parseInt(document.getElementById('calories').value);

      if (!cal || cal <= 0) return alert("カロリー入れろよ");

      let allData = getData();
      if (!allData[date]) allData[date] = [];

      allData[date].push({ type, cal });
      saveData(allData);

      renderToday();
      document.getElementById('calories').value = '';
    }

    function renderToday() {
      const date = dateInput.value;
      const allData = getData();
      const entries = allData[date] || [];
      
      let html = `<h3 style="margin:0 0 15px 0;">${date} の記録</h3>`;
      let total = 0;

      entries.forEach((entry, i) => {
        total += entry.cal;
        html += `
          <div class="entry">
            <span>${entry.type}　<b>${entry.cal}</b> kcal</span>
            <span class="delete" onclick="deleteEntry('${date}', ${i})">×</span>
          </div>`;
      });

      document.getElementById('todayLog').innerHTML = html || '<p style="color:#64748b;">まだ記録なし</p>';
      document.getElementById('todayTotal').innerHTML = `合計: <b>${total}</b> kcal`;
    }

    function deleteEntry(date, index) {
      let allData = getData();
      if (allData[date]) {
        allData[date].splice(index, 1);
        if (allData[date].length === 0) delete allData[date];
        saveData(allData);
        renderToday();
      }
    }

    function showGraph() {
      const allData = getData();
      const dates = Object.keys(allData).sort();
      const totals = dates.map(d => allData[d].reduce((sum, e) => sum + e.cal, 0));

      if (dates.length === 0) return alert("データがまだないぞ");

      const ctx = document.getElementById('myChart');
      if (window.myChartInstance) window.myChartInstance.destroy();

      window.myChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: '1日の合計カロリー',
            data: totals,
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0, 255, 204, 0.15)',
            tension: 0.4,
            borderWidth: 4
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#a5f3fc' } }
          },
          scales: {
            x: { ticks: { color: '#64748b' } },
            y: { ticks: { color: '#64748b' }, beginAtZero: true, grid: { color: '#1e2937' } }
          }
        }
      });
    }

    dateInput.addEventListener('change', renderToday);
    window.onload = renderToday;
  </script>
</body>
</html>
